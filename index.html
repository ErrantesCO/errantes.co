<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Errantes</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <video id="ascii-video" autoplay loop muted playsinline preload="none" width="1667" height="988">
      <source src="assets/ascii-art-mobile.webm" type="video/webm" media="(max-width: 768px)">
      <source src="assets/ascii-art.webm" type="video/webm">
    </video>
  </main>
  <script>
    const prefersReducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    const video = document.getElementById("ascii-video");

    if (prefersReducedMotion.matches && video) {
      video.removeAttribute("autoplay");
      video.pause();
      video.currentTime = 0;
    }
  </script>
</body>
</html>
